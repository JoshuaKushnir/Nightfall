name: Nightfall CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Roblox Tests
        env:
          RBLX_OC_API_KEY: ${{ secrets.RBLX_OC_API_KEY }}
          RBLX_UNIVERSE_ID: ${{ vars.RBLX_UNIVERSE_ID }}
          RBLX_PLACE_ID: ${{ vars.RBLX_PLACE_ID }}
        run: |
          python3 ci/poll_task.py
